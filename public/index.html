<!DOCTYPE html>
<html>
<head>
<title>Secure Login</title>
<style>
body{font-family:Arial;background:#0a1f44;color:white;text-align:center;padding-top:100px}
input{padding:15px;width:80%;margin:10px;border-radius:8px;border:none}
button{padding:15px;width:85%;background:#0a1f44;color:white;border:2px solid white;border-radius:8px}
</style>
</head>

<body>

<h1>Secure Bank Login</h1>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<script>
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u && p){
localStorage.setItem("user",u);
window.location="dashboard.html";
}else{
alert("Invalid login");
}
}
</script>

</body>
</html>
