<!DOCTYPE html>
<html>
<head>
  <title>Withdraw</title>
  <style>
    body { font-family: Arial; background:#f4f4f4; margin:0; }
    .top { background:#0b1e3c; color:white; padding:15px; }
    .card { background:white; padding:20px; margin:20px; border-radius:10px; }
    input, select { width:100%; padding:12px; margin:10px 0; border-radius:5px; border:1px solid #ccc; }
    button { width:100%; padding:12px; background:#0b1e3c; color:white; border:none; border-radius:5px; }
  </style>
</head>
<body>

<div class="top">Withdraw Funds</div>

<div class="card">
  <input type="text" placeholder="Full Legal Name" id="name">
  <input type="text" placeholder="Routing Number" id="routing">
  <input type="text" placeholder="Account Number" id="account">
  
  <select id="type">
    <option value="">Account Type</option>
    <option>Checking</option>
    <option>Savings</option>
  </select>

  <input type="number" placeholder="Amount" id="amount">

  <button onclick="withdraw()">Withdraw</button>
</div>

<script>
function withdraw(){
  let name = document.getElementById("name").value;
  let routing = document.getElementById("routing").value;
  let account = document.getElementById("account").value;
  let type = document.getElementById("type").value;
  let amount = document.getElementById("amount").value;

  if(!name || !routing || !account || !type || !amount){
    alert("Fill all fields");
    return;
  }

  alert("Withdrawal successful");
  window.location = "dashboard.html";
}
</script>

</body>
</html>
